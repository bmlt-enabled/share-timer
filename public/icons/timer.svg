<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#030712"/>
  <!-- Outer track ring -->
  <circle cx="256" cy="272" r="168" fill="none" stroke="#1F2937" stroke-width="28"/>
  <!-- Green progress ring (~75%) -->
  <circle cx="256" cy="272" r="168" fill="none" stroke="#10B981" stroke-width="28"
    stroke-linecap="round"
    stroke-dasharray="791 264"
    transform="rotate(-90 256 272)"/>
  <!-- Clock face center dot -->
  <circle cx="256" cy="272" r="10" fill="#10B981"/>
  <!-- Minute hand -->
  <line x1="256" y1="272" x2="256" y2="152" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <!-- Hour hand -->
  <line x1="256" y1="272" x2="316" y2="232" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <!-- Top crown / button -->
  <rect x="228" y="68" width="56" height="22" rx="11" fill="#6B7280"/>
  <!-- Crown left ear -->
  <rect x="196" y="60" width="36" height="14" rx="7" fill="#6B7280" transform="rotate(-30 196 60)"/>
  <!-- Crown right ear -->
  <rect x="280" y="60" width="36" height="14" rx="7" fill="#6B7280" transform="rotate(30 316 60)"/>
</svg>
